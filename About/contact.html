<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="page-depth" content="1">
    <title>お問い合わせ — ayase-tech</title>
    <meta name="description" content="ayase-techへのお問い合わせはこちらから。Google Formsでお気軽にご連絡ください。">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

    <div id="site-header"></div>

    <!-- Page Header -->
    <div class="page-header">
        <div class="container">
            <div class="breadcrumb">
                <a href="index.html">ホーム</a>
                <span>/</span>
                <span>お問い合わせ</span>
            </div>
            <h1>お問い合わせ</h1>
            <p>ご質問やご相談がありましたら、お気軽にお問い合わせください。</p>
        </div>
    </div>

    <!-- Contact Form -->
    <section class="section">
        <div class="container container--narrow">
            <div class="section-header fade-in">
                <p class="section-label">Contact</p>
                <h2 class="section-title">フォームからお問い合わせ</h2>
                <p class="section-subtitle">以下のフォームからお問い合わせいただけます。通常、3営業日以内にご返信いたします。</p>
            </div>

            <div class="form-embed fade-in">
                <iframe
                    src="https://docs.google.com/forms/d/e/1FAIpQLSdDGRMUtuq2_3sW-QbIvTRluTtk2Q9Fj0Lc95Azq4fjAAaxgg/viewform?embedded=true"
                    width="100%" height="800" frameborder="0" marginheight="0" marginwidth="0" title="お問い合わせフォーム">
                    読み込み中…
                </iframe>
            </div>

            <!-- Alternative Contact -->
            <div class="fade-in" style="margin-top:var(--space-2xl);text-align:center;">
                <p style="color:var(--color-text-light);font-size:0.9rem;margin-bottom:var(--space-md);">
                    フォームが表示されない場合は、以下のリンクからアクセスしてください。
                </p>
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSdDGRMUtuq2_3sW-QbIvTRluTtk2Q9Fj0Lc95Azq4fjAAaxgg/viewform"
                    target="_blank" rel="noopener" class="btn btn--outline btn--sm">
                    Google Forms を開く →
                </a>
            </div>
        </div>
    </section>

    <div id="site-footer"></div>

    <script src="../assets/Javascript/main.js"></script>
</body>

</html>
